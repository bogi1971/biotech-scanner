name: Deploy to Proxmox

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Neuen Code auf den Server ziehen
        uses: actions/checkout@v3

      - name: Altes Skript stoppen und neues starten
        run: |
          # 1. Altes Skript stoppen, falls es läuft
          pkill -f "news_collector.py" || true
          
          # 2. Verhindern, dass GitHub das Skript sofort killt
          export RUNNER_TRACKING_ID=""
          
          # 3. Skript mit DEINER virtuellen Umgebung starten!
          nohup /home/bogi1971/biotech-scanner/venv/bin/python -u news_collector.py > news_collector.log 2>&1 &
          
          echo "🚀 Update erfolgreich eingespielt!"
