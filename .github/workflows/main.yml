name: Deploy to Proxmox

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Neuen Code auf den Server ziehen
        uses: actions/checkout@v3

      - name: Altes Skript stoppen und neues starten
        run: |
          # 1. Altes Skript stoppen
          pkill -f "news_collector.py" || true
          
          # 2. Notwendige Python-Pakete sicherstellen
          pip3 install -r requirements.txt || true
          
          # 3. Verhindern, dass GitHub das Skript nach Abschluss sofort killt
          export RUNNER_TRACKING_ID=""
          
          # 4. Skript starten (-u sorgt dafür, dass die Text-Ausgaben sofort in die Log-Datei fließen)
          nohup python3 -u news_collector.py > news_collector.log 2>&1 &
          
          echo "🚀 Update erfolgreich eingespielt!"
